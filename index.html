<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escalas 3D</title>

<style>
html,body{margin:0;height:100%;overflow:hidden;font-family:Arial}
canvas{display:block}

#ui{
  position:fixed;top:10px;left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,.9);
  padding:10px 20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,.2);
  text-align:center;
}

.label{
  position:absolute;
  background:white;
  padding:4px 8px;
  border-radius:6px;
  font-weight:bold;
  font-size:12px;
}
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
</head>

<body>

<div id="ui">
  ⬅️ MITAD (1:2) | MODELO | DOBLE (2:1) ➡️<br>
  <button onclick="check()">✔ COMPROBAR</button>
  <div id="feedback"></div>
</div>

<div id="l1" class="label"></div>
<div id="l2" class="label"></div>
<div id="l3" class="label"></div>

<script type="module">
import * as THREE from "three";
import {OrbitControls} from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";
import {TransformControls} from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/TransformControls.js";

/* ESCENA */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
camera.position.set(10,10,14);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.8));
const light = new THREE.DirectionalLight(0xffffff,0.6);
light.position.set(10,20,10);
scene.add(light);

scene.add(new THREE.GridHelper(20,20));

/* TRANSFORM */
const transform = new TransformControls(camera, renderer.domElement);
transform.setMode("scale");
scene.add(transform);

transform.addEventListener("dragging-changed", e=>{
  controls.enabled = !e.value;
});

/* GEOMETRÍA BASE */
const geo = new THREE.BoxGeometry(2,2,2);

/* NIVELES (SIN GROUP → ESTABLE) */
const levels = [
  {x:1,y:1,z:1},      // cubo
  {x:1,y:1.5,z:0.5},  // rectángulo
  {x:0.5,y:2,z:0.5},  // torre
  {x:2,y:0.5,z:1},    // plano
  {x:1,y:2,z:1}       // alto
];

let level = 0;

let left, center, right;

function createFigure(x){
  const mat = new THREE.MeshStandardMaterial({color:0x4da3ff});
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x,1,0);
  scene.add(m);
  return m;
}

function loadLevel(){

  if(left) scene.remove(left);
  if(center) scene.remove(center);
  if(right) scene.remove(right);

  const s = levels[level];

  left = createFigure(-5);
  center = createFigure(0);
  right = createFigure(5);

  center.scale.set(s.x,s.y,s.z);

  transform.detach();
}

loadLevel();

/* CLICK */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener("click",(e)=>{
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;

  raycaster.setFromCamera(mouse,camera);
  const hits = raycaster.intersectObjects([left,right]);

  if(hits.length){
    transform.attach(hits[0].object);
  }else{
    transform.detach();
  }
});

/* MEDIDAS */
function getSize(obj){
  return {
    x:(obj.scale.x*2).toFixed(1),
    y:(obj.scale.y*2).toFixed(1),
    z:(obj.scale.z*2).toFixed(1)
  };
}

function label(obj,el){
  const v = obj.position.clone().project(camera);
  el.style.left = (v.x*0.5+0.5)*innerWidth+"px";
  el.style.top = (-v.y*0.5+0.5)*innerHeight+"px";

  const s = getSize(obj);
  el.innerText = `${s.x}×${s.y}×${s.z}`;
}

/* CHECK */
window.check = function(){

  const base = getSize(center);
  const half = getSize(left);
  const double = getSize(right);

  const okLeft =
    Math.abs(half.x - base.x/2) < 0.3 &&
    Math.abs(half.y - base.y/2) < 0.3 &&
    Math.abs(half.z - base.z/2) < 0.3;

  const okRight =
    Math.abs(double.x - base.x*2) < 0.3 &&
    Math.abs(double.y - base.y*2) < 0.3 &&
    Math.abs(double.z - base.z*2) < 0.3;

  left.material.color.set(okLeft ? "green":"red");
  right.material.color.set(okRight ? "green":"red");

  const feedback = document.getElementById("feedback");

  if(okLeft && okRight){
    feedback.innerText="🔥 NIVEL SUPERADO";
    feedback.style.color="green";

    setTimeout(()=>{
      level = (level+1)%levels.length;
      loadLevel();
    },1000);

  }else{
    feedback.innerText="❌ Revisa proporciones";
    feedback.style.color="red";
  }
};

/* LOOP */
function animate(){
  requestAnimationFrame(animate);
  controls.update();

  label(left,l1);
  label(center,l2);
  label(right,l3);

  renderer.render(scene,camera);
}
animate();

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escalas 3D PRO</title>

<style>
html,body{margin:0;height:100%;overflow:hidden;font-family:Arial}
canvas{display:block}

.label{
  position:absolute;
  background:rgba(255,255,255,.9);
  padding:4px 8px;
  border-radius:6px;
  font-weight:bold;
  font-size:12px;
}

#ui{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:10px 20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,.2);
  text-align:center;
}

button{
  padding:8px 15px;
  margin-top:5px;
  font-weight:bold;
  cursor:pointer;
}
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
</head>

<body>

<div id="ui">
  ⬅️ MITAD | MODELO | DOBLE ➡️<br>
  <button onclick="check()">✔ COMPROBAR</button>
  <div id="feedback"></div>
</div>

<div id="labelLeft" class="label"></div>
<div id="labelCenter" class="label"></div>
<div id="labelRight" class="label"></div>

<script type="module">
import * as THREE from "three";
import {OrbitControls} from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";
import {TransformControls} from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/TransformControls.js";

/* ESCENA */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

const camera = new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,100);
camera.position.set(10,10,14);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera,renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.8));
const light = new THREE.DirectionalLight(0xffffff,0.6);
light.position.set(10,20,10);
scene.add(light);

scene.add(new THREE.GridHelper(20,20));

/* FIGURAS */
const geo = new THREE.BoxGeometry(2,2,2);

function create(x){
  const mat = new THREE.MeshStandardMaterial({color:0x4da3ff});
  const m = new THREE.Mesh(geo,mat);
  m.position.set(x,1,0);
  scene.add(m);
  return m;
}

const left = create(-5);
const center = create(0);
const right = create(5);

/* TRANSFORM */
const transform = new TransformControls(camera,renderer.domElement);
transform.setMode("scale");
scene.add(transform);

transform.addEventListener("dragging-changed", e=>{
  controls.enabled = !e.value;
});

/* SELECCIÓN */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener("click",(e)=>{
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;

  raycaster.setFromCamera(mouse,camera);
  const hits = raycaster.intersectObjects([left,right]);

  if(hits.length){
    transform.attach(hits[0].object);
  }
});

/* MEDIDAS */
function getSize(obj){
  return {
    x:(obj.scale.x*2).toFixed(1),
    y:(obj.scale.y*2).toFixed(1),
    z:(obj.scale.z*2).toFixed(1)
  };
}

/* LABELS */
const labelLeft = document.getElementById("labelLeft");
const labelCenter = document.getElementById("labelCenter");
const labelRight = document.getElementById("labelRight");

function updateLabel(obj, label){
  const vector = obj.position.clone().project(camera);
  const x = (vector.x*0.5+0.5)*innerWidth;
  const y = (-vector.y*0.5+0.5)*innerHeight;

  const s = getSize(obj);
  label.innerText = `${s.x} × ${s.y} × ${s.z}`;
  label.style.left = x+"px";
  label.style.top = y+"px";
}

/* CHECK */
window.check = function(){

  const base = getSize(center);
  const half = getSize(left);
  const double = getSize(right);

  let okL =
    Math.abs(half.x - base.x/2)<0.3 &&
    Math.abs(half.y - base.y/2)<0.3 &&
    Math.abs(half.z - base.z/2)<0.3;

  let okR =
    Math.abs(double.x - base.x*2)<0.3 &&
    Math.abs(double.y - base.y*2)<0.3 &&
    Math.abs(double.z - base.z*2)<0.3;

  left.material.color.set(okL?"green":"red");
  right.material.color.set(okR?"green":"red");

  const f = document.getElementById("feedback");

  if(okL && okR){
    f.innerText="🔥 PERFECTO";
    f.style.color="green";
  }else{
    f.innerText="❌ Revisa proporciones";
    f.style.color="red";
  }
};

/* LOOP */
function animate(){
  requestAnimationFrame(animate);
  controls.update();

  updateLabel(left,labelLeft);
  updateLabel(center,labelCenter);
  updateLabel(right,labelRight);

  renderer.render(scene,camera);
}
animate();

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>

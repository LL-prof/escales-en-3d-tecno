<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escalas 3D</title>

<style>
html,body{margin:0;height:100%;overflow:hidden;font-family:Arial}
canvas{display:block}

#ui{
  position:fixed;top:10px;left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,.9);
  padding:10px 20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,.2);
  text-align:center;
}

.label{
  position:absolute;
  background:white;
  padding:4px 8px;
  border-radius:6px;
  font-weight:bold;
  font-size:12px;
}
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
</head>

<body>

<div id="ui">
  ⬅️ MITAD (1:2) | MODELO | DOBLE (2:1) ➡️<br>
  <button onclick="check()">✔ COMPROBAR</button>
  <div id="feedback"></div>
</div>

<div id="l1" class="label"></div>
<div id="l2" class="label"></div>
<div id="l3" class="label"></div>

<script type="module">
import * as THREE from "three";
import {OrbitControls} from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";
import {TransformControls} from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/TransformControls.js";

/* ESCENA */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
camera.position.set(10,10,14);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.8));
const light = new THREE.DirectionalLight(0xffffff,0.6);
light.position.set(10,20,10);
scene.add(light);

scene.add(new THREE.GridHelper(20,20));

/* TRANSFORM */
const transform = new TransformControls(camera, renderer.domElement);
transform.setMode("scale");
scene.add(transform);

transform.addEventListener("dragging-changed", e=>{
  controls.enabled = !e.value;
});

/* -------- FORMAS -------- */

function cube(){
  return new THREE.Mesh(
    new THREE.BoxGeometry(2,2,2),
    new THREE.MeshStandardMaterial({color:0x4da3ff})
  );
}

function rect(){
  const m = cube();
  m.scale.set(1,1.5,0.5);
  return m;
}

function tower(){
  const m = cube();
  m.scale.set(0.5,2,0.5);
  return m;
}

function L(){
  const g = new THREE.Group();

  const a = cube();
  a.scale.set(1,0.5,0.5);

  const b = cube();
  b.scale.set(0.5,1.5,0.5);
  b.position.y = 2;

  g.add(a,b);
  return g;
}

function arrow(){
  const g = new THREE.Group();

  const base = cube();
  base.scale.set(1.5,0.5,0.5);

  const head = new THREE.Mesh(
    new THREE.ConeGeometry(1,2,4),
    new THREE.MeshStandardMaterial({color:0x4da3ff})
  );
  head.rotation.z = Math.PI/2;
  head.position.x = 3;

  g.add(base,head);
  return g;
}

const levels = [cube, rect, tower, L, arrow];
let level = 0;

/* -------- CARGA -------- */

let current = [];

function loadLevel(){

  current.forEach(o=>scene.remove(o));

  const shape = levels[level];

  const left = shape();
  const center = shape();
  const right = shape();

  left.position.set(-5,1,0);
  center.position.set(0,1,0);
  right.position.set(5,1,0);

  scene.add(left,center,right);

  current = [left,center,right];

  transform.detach();
}

/* CLICK */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener("click",(e)=>{
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;

  raycaster.setFromCamera(mouse,camera);
  const hits = raycaster.intersectObjects(current,true);

  if(hits.length){
    const obj = hits[0].object;

    const parent = current.find(o=>o===obj || o.children.includes(obj));

    if(parent && parent !== current[1]){
      transform.attach(parent);
    }
  }else{
    transform.detach();
  }
});

/* MEDIDAS */
function size(o){
  const box = new THREE.Box3().setFromObject(o);
  const v = new THREE.Vector3();
  box.getSize(v);
  return v;
}

function label(obj,el){
  const v = obj.position.clone().project(camera);
  el.style.left = (v.x*0.5+0.5)*innerWidth+"px";
  el.style.top = (-v.y*0.5+0.5)*innerHeight+"px";

  const s = size(obj);
  el.innerText = `${s.x.toFixed(1)}×${s.y.toFixed(1)}×${s.z.toFixed(1)}`;
}

/* CHECK */
window.check = function(){

  const [l,c,r] = current;

  const bs = size(c);
  const ls = size(l);
  const rs = size(r);

  const okL =
    Math.abs(ls.x - bs.x/2) < 0.3 &&
    Math.abs(ls.y - bs.y/2) < 0.3 &&
    Math.abs(ls.z - bs.z/2) < 0.3;

  const okR =
    Math.abs(rs.x - bs.x*2) < 0.3 &&
    Math.abs(rs.y - bs.y*2) < 0.3 &&
    Math.abs(rs.z - bs.z*2) < 0.3;

  l.traverse(m=>m.material && m.material.color.set(okL?"green":"red"));
  r.traverse(m=>m.material && m.material.color.set(okR?"green":"red"));

  const feedback = document.getElementById("feedback");

  if(okL && okR){
    feedback.innerText="🔥 NIVEL SUPERADO";
    feedback.style.color="green";

    setTimeout(()=>{
      level = (level+1)%levels.length;
      loadLevel();
    },1000);
  }else{
    feedback.innerText="❌ Revisa proporciones";
    feedback.style.color="red";
  }
};

/* LOOP */
function animate(){
  requestAnimationFrame(animate);
  controls.update();

  label(current[0],l1);
  label(current[1],l2);
  label(current[2],l3);

  renderer.render(scene,camera);
}
animate();

loadLevel();

</script>

</body>
</html>

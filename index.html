<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escalas 3D</title>

<style>
html,body{margin:0;height:100%;overflow:hidden;font-family:Arial;background:#eaeaea}
canvas{display:block}

.label{
  position:absolute;
  background:white;
  padding:4px 8px;
  border-radius:6px;
  font-weight:bold;
  font-size:12px;
}

#ui{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:10px;
  border-radius:10px;
}
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
</head>

<body>

<div id="ui">
  ⬅️ MITAD | MODELO | DOBLE ➡️<br>
  <button onclick="check()">✔ COMPROBAR</button>
  <div id="feedback"></div>
</div>

<div id="l1" class="label"></div>
<div id="l2" class="label"></div>
<div id="l3" class="label"></div>

<script type="module">
import * as THREE from "three";
import {OrbitControls} from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";
import {TransformControls} from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/TransformControls.js";

/* ESCENA */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeaeaea);

const camera = new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,100);
camera.position.set(8,8,12);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera,renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.9));

/* FIGURAS */
function cube(){
  return new THREE.Mesh(new THREE.BoxGeometry(2,2,2), new THREE.MeshStandardMaterial({color:0x4da3ff}));
}

function L(){
  const g = new THREE.Group();
  const m1 = cube();
  const m2 = cube();
  m2.scale.y = 2;
  m2.position.y = 2;
  g.add(m1,m2);
  return g;
}

function arrow(){
  const g = new THREE.Group();
  const base = cube();
  base.scale.x = 2;
  const head = new THREE.Mesh(new THREE.ConeGeometry(1,2,4), new THREE.MeshStandardMaterial({color:0x4da3ff}));
  head.rotation.z = Math.PI/2;
  head.position.x = 3;
  g.add(base,head);
  return g;
}

const shapes = [cube, L, arrow];
let level = 0;

let left,center,right;

function load(){
  scene.clear();
  scene.add(new THREE.AmbientLight(0xffffff,0.9));
  scene.add(transform);

  const shape = shapes[level];

  left = shape(); left.position.x = -4;
  center = shape();
  right = shape(); right.position.x = 4;

  scene.add(left,center,right);

  transform.detach();
}

/* TRANSFORM */
const transform = new TransformControls(camera,renderer.domElement);
transform.setMode("scale");

transform.addEventListener("dragging-changed", e=>{
  controls.enabled = !e.value;
});

/* CLICK */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener("click",(e)=>{
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;

  raycaster.setFromCamera(mouse,camera);
  const hits = raycaster.intersectObjects([left,right],true);

  if(hits.length){
    transform.attach(hits[0].object.parent || hits[0].object);
  }else{
    transform.detach();
  }
});

/* MEDIDAS */
function size(o){
  const box = new THREE.Box3().setFromObject(o);
  const v = new THREE.Vector3();
  box.getSize(v);
  return v;
}

function label(obj,el){
  const v = obj.position.clone().project(camera);
  el.style.left = (v.x*0.5+0.5)*innerWidth+"px";
  el.style.top = (-v.y*0.5+0.5)*innerHeight+"px";

  const s = size(obj);
  el.innerText = `${s.x.toFixed(1)}×${s.y.toFixed(1)}×${s.z.toFixed(1)}`;
}

/* CHECK */
window.check = function(){
  const b = size(center);
  const l = size(left);
  const r = size(right);

  const okL = Math.abs(l.x-b.x/2)<0.3 && Math.abs(l.y-b.y/2)<0.3 && Math.abs(l.z-b.z/2)<0.3;
  const okR = Math.abs(r.x-b.x*2)<0.3 && Math.abs(r.y-b.y*2)<0.3 && Math.abs(r.z-b.z*2)<0.3;

  left.traverse(m=>m.material && (m.material.color.set(okL?"green":"red")));
  right.traverse(m=>m.material && (m.material.color.set(okR?"green":"red")));

  if(okL && okR){
    document.getElementById("feedback").innerText="🔥 PERFECTO";
    setTimeout(()=>{
      level = (level+1)%shapes.length;
      load();
    },1000);
  }
};

/* LOOP */
function animate(){
  requestAnimationFrame(animate);
  controls.update();

  label(left,l1);
  label(center,l2);
  label(right,l3);

  renderer.render(scene,camera);
}
animate();

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

load();
</script>

</body>
</html>

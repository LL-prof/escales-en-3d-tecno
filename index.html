<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escalas 3D</title>

<style>
html,body{margin:0;height:100%;overflow:hidden;font-family:Arial;background:#eaeaea}
canvas{display:block}

.label{
  position:absolute;
  background:white;
  padding:4px 8px;
  border-radius:6px;
  font-weight:bold;
  font-size:12px;
}

#ui{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:10px;
  border-radius:10px;
}
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
</head>

<body>

<div id="ui">
  ⬅️ MITAD | MODELO | DOBLE ➡️<br>
  <button onclick="check()">✔ COMPROBAR</button>
  <div id="feedback"></div>
</div>

<div id="l1" class="label"></div>
<div id="l2" class="label"></div>
<div id="l3" class="label"></div>

<script type="module">
import * as THREE from "three";
import {OrbitControls} from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";
import {TransformControls} from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/TransformControls.js";

/* ESCENA */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeaeaea);

const camera = new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,100);
camera.position.set(8,8,12);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera,renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

/* TRANSFORM */
const transform = new TransformControls(camera,renderer.domElement);
transform.setMode("scale");
scene.add(transform);

transform.addEventListener("dragging-changed", e=>{
  controls.enabled = !e.value;
});

/* FIGURAS */
let current = [];

function clearObjects(){
  current.forEach(o=>scene.remove(o));
  current = [];
}

function cube(){
  return new THREE.Mesh(
    new THREE.BoxGeometry(2,2,2),
    new THREE.MeshStandardMaterial({color:0x4da3ff})
  );
}

function load(){
  clearObjects();

  const left = cube();
  const center = cube();
  const right = cube();

  left.position.x = -4;
  right.position.x = 4;

  scene.add(left,center,right);

  current = [left,center,right];
}

/* CLICK */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener("click",(e)=>{
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;

  raycaster.setFromCamera(mouse,camera);
  const hits = raycaster.intersectObjects(current);

  if(hits.length){
    const obj = hits[0].object;
    if(obj !== current[1]){ // no tocar centro
      transform.attach(obj);
    }
  }else{
    transform.detach();
  }
});

/* MEDIDAS */
function size(o){
  const box = new THREE.Box3().setFromObject(o);
  const v = new THREE.Vector3();
  box.getSize(v);
  return v;
}

function label(obj,el){
  const v = obj.position.clone().project(camera);
  el.style.left = (v.x*0.5+0.5)*innerWidth+"px";
  el.style.top = (-v.y*0.5+0.5)*innerHeight+"px";

  const s = size(obj);
  el.innerText = `${s.x.toFixed(1)}×${s.y.toFixed(1)}×${s.z.toFixed(1)}`;
}

/* CHECK */
window.check = function(){
  const [l,c,r] = current;

  const bs = size(c);
  const ls = size(l);
  const rs = size(r);

  const okL = Math.abs(ls.x-bs.x/2)<0.3 && Math.abs(ls.y-bs.y/2)<0.3 && Math.abs(ls.z-bs.z/2)<0.3;
  const okR = Math.abs(rs.x-bs.x*2)<0.3 && Math.abs(rs.y-bs.y*2)<0.3 && Math.abs(rs.z-bs.z*2)<0.3;

  l.material.color.set(okL?"green":"red");
  r.material.color.set(okR?"green":"red");

  if(okL && okR){
    document.getElementById("feedback").innerText="🔥 PERFECTO";
  }
};

/* LOOP */
function animate(){
  requestAnimationFrame(animate);
  controls.update();

  label(current[0],l1);
  label(current[1],l2);
  label(current[2],l3);

  renderer.render(scene,camera);
}
animate();

load();
</script>

</body>
</html>
